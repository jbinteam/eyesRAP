dataset:
  # Where to save the generated dataset
  output_dir: "/home/jb/dataset_generator/ply_model/emergency/augmented"
  # Folder containing background images
  bg_dir: "/home/jb/synthesis_dataset/bg_dataset/VOC2012_test/VOC2012_test/JPEGImages"
  # Number of images to generate PER OBJECT
  img_count: 100
  # Output resolution [width, height]
  resolution: [640, 480]

parameters:
  # Camera distance: 1.0 = tight fit, 2.5 = far away
  max_distance_factor: 2.0
  # Soften edges: 0 = sharp, 1-3 = soft edges
  edge_blur_radius: 1.5
  # Background scaling: Randomly scale bg between 1.0x and 2.0x
  bg_scale_range: [1.0, 2.0]

# List of PLY files to process
objects:
  - "/home/jb/realityscan/model/emergency/ply_model/emergency.ply"
